<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHOMP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-shell">
    <header class="game-header">
      <h1>CHOMP</h1>
      <p>A Shark Maze Arcade Game</p>
    </header>

    <section class="game-hud" aria-label="Game status" aria-live="polite">
      <div class="hud-item">
        <span class="hud-label">Score</span>
        <span id="scoreValue">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">High Score</span>
        <span id="highScoreValue">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Chum Left</span>
        <span id="chumValue">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Lives</span>
        <span id="livesValue">3</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Level</span>
        <span id="levelValue">1</span>
      </div>
      <div class="hud-item is-hidden" id="frenzyHud">
        <span class="hud-label">Frenzy</span>
        <span id="frenzyValue"></span>
      </div>
      <div class="hud-item is-hidden" id="debugHud">
        <span class="hud-label">Debug</span>
        <span id="debugValue">ON</span>
      </div>
    </section>

    <div class="game-controls" aria-label="Game controls">
      <button
        class="control-button"
        id="pauseButton"
        type="button"
        aria-pressed="false"
        disabled
      >
        Pause
      </button>

      <button
        class="control-button"
        id="soundButton"
        type="button"
        aria-pressed="false"
      >
        Sound: On
      </button>

      <button
        class="control-button"
        id="testAudioButton"
        type="button"
      >
        TEST AUDIO
      </button>

      <button
        class="control-button"
        id="testMainWavButton"
        type="button"
      >
        TEST MAIN WAV
      </button>
    </div>

    <pre
      class="audio-diagnostic"
      id="audioDiagnosticOutput"
      aria-live="polite"
    ></pre>

    <canvas
      id="gameCanvas"
      width="608"
      height="480"
      aria-label="CHOMP game canvas"
    ></canvas>
  </main>

  <script src="script.js"></script>
</body>
</html>
