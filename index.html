<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHOMP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-shell">
    <header class="game-header">
      <h1>CHOMP</h1>
      <p>A Shark Maze Arcade Game</p>
    </header>

    <section class="game-hud" aria-label="Game status" aria-live="polite">
      <div class="hud-item">
        <span class="hud-label">Score</span>
        <span id="scoreValue">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">High Score</span>
        <span id="highScoreValue">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Chum Left</span>
        <span id="chumValue">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Lives</span>
        <span id="livesValue">3</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Level</span>
        <span id="levelValue">1</span>
      </div>
      <div class="hud-item is-hidden" id="frenzyHud">
        <span class="hud-label">Frenzy</span>
        <span id="frenzyValue"></span>
      </div>
      <div class="hud-item is-hidden" id="debugHud">
        <span class="hud-label">Debug Mode</span>
        <span id="debugValue">ACTIVE</span>
      </div>
    </section>

    <div class="game-controls" aria-label="Game controls">
      <button
        class="control-button"
        id="pauseButton"
        type="button"
        aria-pressed="false"
        disabled
      >
        Pause
      </button>

      <button
        class="control-button"
        id="soundButton"
        type="button"
        aria-pressed="false"
      >
        Sound: On
      </button>
    </div>

    <section class="debug-controls is-hidden" id="debugControls" aria-label="Debug controls" hidden>
      <div class="debug-badge">DEBUG MODE</div>
      <div class="debug-row">
        <button class="debug-button" id="debugPreviousLevelButton" type="button">Prev Level</button>
        <button class="debug-button" id="debugNextLevelButton" type="button">Next Level</button>
        <label class="debug-level-jump" for="debugLevelInput">
          Level
          <input id="debugLevelInput" type="number" min="1" max="50" value="1">
        </label>
        <button class="debug-button" id="debugJumpLevelButton" type="button">Jump</button>
        <button class="debug-button" id="debugCompleteLevelButton" type="button">Complete Level</button>
      </div>
      <div class="debug-row">
        <button class="debug-button" id="debugRemoveLifeButton" type="button">- Life</button>
        <button class="debug-button" id="debugAddLifeButton" type="button">+ Life</button>
        <button class="debug-button" id="debugExtraLifeButton" type="button">Test Extra Life</button>
        <button class="debug-button" id="debugFrenzyButton" type="button">Frenzy</button>
        <button class="debug-button" id="debugDeathButton" type="button">Death</button>
        <button class="debug-button" id="debugWinButton" type="button">Final Victory</button>
      </div>
    </section>

    <canvas
      id="gameCanvas"
      width="608"
      height="480"
      aria-label="CHOMP game canvas"
    ></canvas>
  </main>

  <script src="script.js?v=pages-audio-unlock-1"></script>
</body>
</html>
